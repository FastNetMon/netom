<html>
<head>
    <meta charset="UTF-8">
    <title>Netom WebUI</title>
    <link rel="icon" type="image/svg+xml"
                     href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxNiAxNiI+PHJlY3Qgd2lkdGg9IjE2IiBoZWlnaHQ9IjE2IiByeD0iMyIgZmlsbD0iIzFhNWZiNCIvPjx0ZXh0IHg9IjgiIHk9IjEyLjUiIGZvbnQtZmFtaWx5PSJzYW5zLXNlcmlmIiBmb250LXNpemU9IjExIiBmb250LXdlaWdodD0iYm9sZCIgZmlsbD0iI2ZmZmZmZiIgdGV4dC1hbmNob3I9Im1pZGRsZSI+TjwvdGV4dD48L3N2Zz4="/>
    <style>
        table, tr, td, th {
            border: 1px solid black;
        }
        table {
            /*min-width: 95%;*/
            white-space: nowrap;
        }
        td {
            padding: 2px 10px;
        }
        th {
            position: sticky;
            top: 0;
            padding: 5px;
            background: whitesmoke;
        }

        span.green, td.green {
            background: greenyellow;
        }
        span.yellow, td.yellow {
            background: yellow;
        }
        span.red, td.red {
            background: red;
        }

        td:has(span) {
            padding: 0;
        }

        ul.legend {
            list-style: none
        }

        ul.legend li::before {padding: 0; margin: 0; vertical-align: middle; line-height: 1rem}
        ul.legend li.green::before {content: "•"; color: green; font-size: 3em; }
        ul.legend li.yellow::before {content: "•"; color: yellow; font-size: 3em; }
        ul.legend li.local::before {content: "L: "; color: white; font-weight: bold;}
        ul.legend li.remote::before {content: "R: "; color: white; font-weight: bold;}

        .tooltip {
            position: relative;
            display: inline-block;
            border-bottom: 1px dotted black;
        }

        .tooltip .tooltiptext {
            visibility: hidden;
            width: fit-content;
            background-color: #555;
            color: #fff;
            text-align: left;
            border-radius: 6px;
            padding: 5px;
            position: absolute;
            z-index: 1;
            top: 2em;
            left: 50%;
            opacity: 0;
            transition: opacity 0.3s;
            transform: translateX(-50%);
            font-weight: initial;
        }

        .tooltip .tooltiptext::before {
            content: "";
            position: absolute;
            bottom: 100%;
            left: 50%;
            margin-left: -5px;
            border-width: 5px;
            border-style: solid;
            border-color: transparent transparent #555 transparent;
        }

        .tooltip:hover .tooltiptext {
            visibility: visible;
            opacity: 1;
        }

        
    </style>
</head>
<body>
    <div class="container">
        <nav>
        <Navigation />
        </nav>
        <main>
            <h1>@title</h1>
            @child_content
        </main>
    </div>
</body>
</html>
